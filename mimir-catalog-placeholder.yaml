# Mimir: The Memory (System)
# NOTE: Move this file to d:/Dev/GitWS/mimir/catalog-info.yaml once the repo is initialized.
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: mimir
  description: The persistent data and state layer.
  annotations:
    vordu.io/row-label: "Data Services"
spec:
  owner: cervator
  domain: yggdrasil

---
# Kafka (Component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-kafka
  system: mimir
  annotations:
    vordu.io/row-label: "Event Streaming"
spec:
  type: service
  lifecycle: production
  owner: cervator

---
# Valkey (Component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-valkey
  system: mimir
  annotations:
    vordu.io/row-label: "Cache & KV"
spec:
  type: service
  lifecycle: production
  owner: cervator

---
# Percona (Component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-percona
  system: mimir
  annotations:
    vordu.io/row-label: "Relational DB"
spec:
  type: service
  lifecycle: production
  owner: cervator

---
# Percona: PostgreSQL (Sub-component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-percona-postgres
  system: mimir
  annotations:
    vordu.io/parent-component: mimir-percona
    vordu.io/row-label: "PostgreSQL Config"
spec:
  type: library
  lifecycle: production
  partOf: mimir-percona
  owner: cervator

---
# Percona: MongoDB (Sub-component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-percona-mongo
  system: mimir
  annotations:
    vordu.io/parent-component: mimir-percona
    vordu.io/row-label: "MongoDB Config"
spec:
  type: library
  lifecycle: production
  partOf: mimir-percona
  owner: cervator

---
# Percona: MySQL (Sub-component)
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mimir-percona-mysql
  system: mimir
  annotations:
    vordu.io/parent-component: mimir-percona
    vordu.io/row-label: "MySQL Config"
spec:
  type: library
  lifecycle: production
  partOf: mimir-percona
  owner: cervator
